repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: wiki-lint
        name: wiki lint
        language: system
        entry: uv run wiki lint --severity error
        pass_filenames: false
        always_run: true
